<!-- The custom widget template is defined here
   - You can use standard HTML tags and AngularJS built-in directives, scope and interpolation system
   - Custom widget properties defined on the right can be used as variables in a templates with properties.newProperty
   - Functions exposed in the controller can be used with ctrl.newFunction()
   - You can use the 'environment' property injected in the scope when inside the Editor whiteboard. It allows to define a mockup
     of the Custom Widget to be displayed in the whiteboard only. By default the widget is represented by an auto-generated icon
     and its name (See the <span> below).
-->
 
<div class="form-group custom-multiselect">

  <label class="control-label">
    {{ properties.label }}
    <span ng-if="properties.required" class="text-danger">*</span>
  </label>

  <div class="dropdown" ng-init="open=false">

    <!-- SELECT BOX -->
    <div class="form-control"
         style="cursor:pointer"
         ng-click="open = !open">

      <span ng-if="!properties.selectedValues.length">
        {{ properties.placeholder }}
      </span>

      <span ng-if="properties.selectedValues.length">
        {{ getSelectedLabels().join(', ') }}
      </span>

    </div>

    <!-- DROPDOWN -->
    <div class="dropdown-menu"
         ng-show="open"
         style="display:block; padding:10px; width:100%; max-height:200px; overflow:auto;">

      <!-- SEARCH -->
      <input ng-if="properties.searchEnabled"
             type="text"
             class="form-control"
             placeholder="Buscar..."
             ng-model="searchText"
             style="margin-bottom:8px;" />

        <!-- OPTIONS -->
        <label ng-repeat="item in properties.items | filter:searchText"
           style="display:block; font-weight:normal;">
    
        <input type="checkbox"
             ng-checked="isSelected(item)"
             ng-click="toggleSelection(item)">
    
            {{ getLabel(item) }}
    
        </label>

    </div>

  </div>

</div>
